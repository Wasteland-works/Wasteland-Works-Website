<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account - Wasteland Works</title>

    <link rel="stylesheet" href="style.css">

    <!-- Firebase -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="register.js"></script>

</head>

<body>

    <div id="site-header"></div>

    <main>

        <section class="card">

            <h1>Create Account</h1>

            <p>
                Join Wasteland Works to save projects, manage your account,
                and access future store features.
            </p>

            <br>

            <label for="displayName">
                Display Name
            </label>

            <input
                id="displayName"
                type="text"
                placeholder="Display Name"
                autocomplete="nickname"
                required>

            <br><br>

            <label for="email">
                Email Address
            </label>

            <input
                id="email"
                type="email"
                placeholder="Email Address"
                autocomplete="email"
                required>

            <br><br>

            <label for="password">
                Password
            </label>

            <input
                id="password"
                type="password"
                placeholder="Password"
                autocomplete="new-password"
                required>

            <br><br>

            <label for="confirmPassword">
                Confirm Password
            </label>

            <input
                id="confirmPassword"
                type="password"
                placeholder="Confirm Password"
                autocomplete="new-password"
                required>

            <br><br>

            <button
                id="registerButton"
                onclick="createAccount()">

                Create Account

            </button>

            <br><br>

            <p>

                Already have an account?

                <a href="login.html">
                    Sign In
                </a>

            </p>

            <p id="message"></p>

        </section>

    </main>

    <div id="site-footer"></div>

    <script src="load-layout.js"></script>

</body>
